name: Validate & Publish

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Publish in dry-run mode without creating a GitHub Release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-validate.yml@main

  publish:
    needs: validate
    permissions:
      contents: read
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-lib-publish.yml@main
    with:
      dry-run: ${{ inputs.dry-run == 'true' }}
    secrets:
      gcp-service-account-key: ${{ secrets.GCP_PUB_DEV_SA_KEY }}

  release:
    needs: publish
    if: ${{ inputs.dry-run != 'true' }}
    permissions:
      contents: write
    uses: anthochamp/dev-toolbox/.github/workflows/util-create-release.yml@main
    with:
      tag: ${{ needs.publish.outputs.tag }}
