name: Validate & Publish

on:
  push:
    tags: [ 'v[0-9]+.[0-9]+.[0-9]+' ]

jobs:
  validate:
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-validate.yml@3bea5f586037d933601c8e045fe27df00b82b0c9
  publish:
    needs: validate
    permissions:
      id-token: write
    uses: anthochamp/dev-toolbox/.github/workflows/flutter-lib-publish.yml@3bea5f586037d933601c8e045fe27df00b82b0c9
